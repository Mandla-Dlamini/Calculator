<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
       *{
        box-sizing: border-box;
       }  

       body{
        font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        background-color: #f0f4f8;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
       }

      .container{
        color: lime;
        width: 325px;
        height: 526px;
        border: 1px solid lime;
        border-radius: 15px;
        padding: 10px;
        background-color: black;

        box-shadow: 3px 5px 10px rgba(0,0,0,1);
       }

       .container h3{
        text-align: center;
        margin-top: 2px;
       }

       input[readonly]{
        width: 100%;
        height: 80px;
        font-size: 40px;
        margin-bottom: 15px;
        border: none;
        border-radius: 5px;

        overflow: scroll;
       }

       input[readonly]:focus{
        outline: none;
       }

       .buttons-container{
        display: grid;
        grid-template-columns: auto auto auto auto;
        grid-auto-columns: 70px;
        grid-auto-rows: 65px;
        grid-gap: 8px;
       }

       .buttons-container button{
        background-color: black;
        color: lime;
        border: 1px solid lime;
        border-radius: 11px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
       }

       .buttons-container button:hover{
        box-shadow: 0 0 5px lime;
          background-color: #2222229d;
       }

       .buttons-container button:active{
        transition: 0.1s;
        color: black;
          background-color: lime;
       }
       .equal-sign{
        grid-column-start: 3;
        grid-column-end: 5;
       }

    </style>
</head>
<body>
    <div class="container">
        <h3>CALCULATOR</h3>
        <input type="text" id="display" readonly>
         <div class="buttons-container">
            <button onclick="clearConsole()">AC</button>
            <button onclick="deleteChar(this.length)">DEL</button>
            <button onclick="appendToDisplay('%')">%</button>
            <button onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')">*</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="equal-sign" onclick="calculate()">=</button>
         </div>

        <div style="text-align: center; margin: 2px;"> &copy; Mandla_Dlamini</div>
    </div>

    <script>
      let display = document.getElementById("display");

      function appendToDisplay(input){
        display.value += input;
      }

      function deleteChar(){
        let currentValue  = display.value;

        if(currentValue.length > 0){
            display.value = currentValue.slice(0,-1) ;
        }
      }

      function calculate(){
           try{
            display.value = eval(display.value);
           }
           catch{
            display.value = "Error";
           }
        }


        function clearConsole(){
            display.value = "";
        }
    </script>
</body>
</html>
